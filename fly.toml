# fly.toml app configuration file generated for shop-chat-agent-rinfit2 on 2026-03-11T14:35:29+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shop-chat-agent-rinfit2'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = "production"
  PORT = '3000'
  DATABASE_URL = "file:/data/dev.sqlite"
  SCOPES = 'unauthenticated_read_product_listings'
  SHOPIFY_API_KEY = '156927094d7cc2431f51e6a7e8fc55e5'
  SHOPIFY_APP_URL = 'https://shop-chat-agent-rinfit2.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
